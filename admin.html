<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>后台管理 · 个人相机收藏图鉴</title>
    <link rel="stylesheet" href="css/style.css" />
    <script>
      if (sessionStorage.getItem("ADM_AUTH") !== "1") {
        location.replace("admin-login.html");
      }
    </script>
  </head>
  <body>
    <div class="container">
      <div class="row" style="justify-content:space-between;margin-bottom:12px;">
        <div>
          <h1 style="margin:0;font-size:20px;">后台管理</h1>
          <p class="muted" style="margin:4px 0 0;">所有「保存」操作会写入仓库根目录 data.json（本地预览模式除外）。</p>
        </div>
        <div class="row">
          <a class="btn btn-ghost" href="index.html" target="_blank" rel="noopener">打开前台</a>
          <button class="btn" type="button" id="btnLogout">退出登录</button>
        </div>
      </div>

      <div class="admin-layout">
        <aside class="admin-nav" id="adminNav"></aside>
        <div class="panel" id="adminPanel">
          <div class="app-boot app-boot--panel" role="status" aria-live="polite" aria-busy="true">
            <div class="app-boot-spinner" aria-hidden="true"></div>
            <p class="app-boot-text">
              正在加载数据<span class="app-boot-dots" aria-hidden="true"><span></span><span></span><span></span></span>
            </p>
          </div>
        </div>
      </div>
    </div>

    <div id="modalMask" style="display:none;position:fixed;inset:0;background:rgba(15,23,42,0.45);z-index:50;padding:20px;overflow:auto;">
      <div class="panel" style="max-width:920px;margin:24px auto;">
        <div class="row" style="justify-content:space-between;margin-bottom:10px;">
          <strong id="modalTitle">编辑</strong>
          <button class="btn" type="button" id="modalClose">关闭</button>
        </div>
        <div id="modalBody"></div>
        <div class="row" style="margin-top:12px;">
          <button class="btn btn-primary" type="button" id="modalSave">保存</button>
        </div>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/github-storage.js"></script>
    <script src="js/admin-app.js"></script>
  </body>
</html>
