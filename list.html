<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>相机图鉴</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="navMount"></div>
    <main class="container" id="app">
      <div class="app-boot-host">
        <div class="app-boot app-boot--panel" role="status" aria-live="polite" aria-busy="true">
          <div class="app-boot-spinner" aria-hidden="true"></div>
          <p class="app-boot-text">正在加载</p>
        </div>
      </div>
    </main>
    <footer class="footer" id="footer"></footer>
    <div class="footer" id="listDebugDock" aria-label="调试工具">
      <button type="button" class="btn btn-ghost" id="btnListDbgExport" style="font-size:13px">
        导出本页调试日志
      </button>
      <span class="muted" style="font-size:12px;margin-left:10px">卡住时先点这里下载 JSON，无需先进后台</span>
    </div>
    <script src="config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/debug-log.js"></script>
    <script>
      try {
        if (window.DebugLog && DebugLog.add) {
          var catParam = "";
          try {
            var params = new URLSearchParams(location.search || "");
            catParam = params.get("category") || "";
          } catch (e) {}
          DebugLog.add("info", "list-html", "list.html 已打开（list-page.js 尚未执行）", {
            href: location.href,
            category: catParam,
          });
        }
      } catch (e) {}
    </script>
    <script src="js/github-storage.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/list-page.js"></script>
    <script>
      (function () {
        var btn = document.getElementById("btnListDbgExport");
        if (!btn) return;
        btn.addEventListener("click", function () {
          if (typeof DebugLog === "undefined" || !DebugLog.exportJson) {
            window.alert(
              "未加载 debug-log.js（或脚本顺序错误）。请在本页按 Ctrl+F5 强制刷新后再试；若仍不行，请打开开发者工具(F12) → Network 确认 js/debug-log.js 是否为 200。"
            );
            return;
          }
          try {
            var text = DebugLog.exportJson();
            var blob = new Blob([text], { type: "application/json;charset=utf-8" });
            var a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "camera-ency-debug-log.json";
            document.body.appendChild(a);
            a.click();
            a.remove();
            setTimeout(function () {
              URL.revokeObjectURL(a.href);
            }, 2000);
            if (typeof AppUtils !== "undefined" && AppUtils.toast) {
              AppUtils.toast("已导出 camera-ency-debug-log.json");
            }
          } catch (e) {
            window.alert("导出失败：" + (e.message || String(e)));
          }
        });
      })();
    </script>
  </body>
</html>
