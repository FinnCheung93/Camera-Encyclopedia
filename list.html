<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>相机图鉴</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="navMount"></div>
    <main class="container" id="app">
      <div class="app-boot-host">
        <div class="app-boot app-boot--panel" role="status" aria-live="polite" aria-busy="true">
          <div class="app-boot-spinner" aria-hidden="true"></div>
          <p class="app-boot-text">正在加载</p>
        </div>
      </div>
    </main>
    <script src="config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/debug-log.js"></script>
    <script>
      try {
        if (window.DebugLog && DebugLog.exportFromUrlIfRequested) {
          DebugLog.exportFromUrlIfRequested();
        }
      } catch (e) {}
    </script>
    <script>
      try {
        if (window.DebugLog && DebugLog.add) {
          var catParam = "";
          try {
            var params = new URLSearchParams(location.search || "");
            catParam = params.get("category") || "";
          } catch (e) {}
          DebugLog.add("info", "list-html", "list.html 已打开（list-page.js 尚未执行）", {
            href: location.href,
            category: catParam,
          });
        }
      } catch (e) {}
    </script>
    <script src="js/github-storage.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/list-page.js?v=20260424-no-second"></script>
  </body>
</html>
